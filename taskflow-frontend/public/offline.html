<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at top, #dbeafe 0%, var(--bg) 45%);
        color: var(--text);
      }

      .card {
        max-width: 420px;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      }

      .logo {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: var(--accent);
        color: white;
        font-size: 28px;
        font-weight: 700;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 1.65rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .hint {
        margin-top: 18px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">T</div>
      <h1>TaskFlow is offline</h1>
      <p>Your app is installed and still available, but this screen needs a connection to refresh live data.</p>
      <p class="hint">Reconnect to the internet and reopen the app to sync tasks and reminders.</p>
    </main>
  </body>
</html>
